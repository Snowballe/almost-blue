name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint · Types · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # react-native-dotenv attend un .env ; en CI on part de l'exemple.
      - run: cp .env.example .env
      - name: TypeScript
        run: npx tsc --noEmit
      - name: ESLint
        run: npx eslint . --max-warnings 0
      - name: Jest
        run: npx jest --ci

  android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
      - run: cp .env.example .env
      # Build debug (signé avec le debug.keystore versionné, aucun secret requis).
      - name: Build debug APK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          cd android && ./gradlew assembleDebug --no-daemon --stacktrace
