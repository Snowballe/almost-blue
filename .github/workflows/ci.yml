name: CI

on:
  push:
    branches: [main, rewrite/kotlin]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Tests unitaires + Android Lint + build debug (signé debug.keystore versionné,
      # aucun secret requis — keystore.properties absent → fallback debug).
      - run: ./gradlew test lint assembleDebug --no-daemon --stacktrace
